version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-ecommerce-volumes
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ecommerce_db
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: ecommerce_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ecommerce_user", "-pecommerce_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  ecommerce-app:
    image: celestial1825/ecommerce-api:1.0.1
    container_name: ecommerce-app
    platform: linux/amd64
    environment:
      QUARKUS_DATASOURCE_USERNAME: ecommerce_user
      QUARKUS_DATASOURCE_PASSWORD: ecommerce_password
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mysql://mysql:3306/ecommerce_db
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-network

volumes:
  mysql-data:

networks:
  ecommerce-network:
    driver: bridge
